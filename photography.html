<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photography · Venus Aradhya</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    /* ===== LAYOUT ===== */
    body { margin: 0; background: #070a12; font-family: 'Poppins', sans-serif; }

    .photo-page {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* hint bar */
    .map-hint {
      padding: 9px 48px;
      background: rgba(7,10,18,0.9);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.45);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      letter-spacing: 0.04em;
    }

    .map-hint-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      flex-shrink: 0;
      animation: pulse 2.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    /* map container */
    #map {
      width: 100%;
      flex: 1;
      min-height: 0;
      background: #080c10;
    }

    .leaflet-container {
      background: #080c10;
      font-family: 'Poppins', sans-serif;
    }

    /* markers */
    .custom-marker {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: rgba(255,255,255,0.85);
      border: 1.5px solid rgba(255,255,255,0.3);
      box-shadow: 0 0 8px rgba(255,255,255,0.3), 0 0 20px rgba(255,255,255,0.1);
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .custom-marker:hover {
      transform: scale(1.6);
      box-shadow: 0 0 14px rgba(255,255,255,0.6);
    }
    .custom-marker.active {
      background: #fff;
      box-shadow: 0 0 20px rgba(255,255,255,0.8);
      transform: scale(1.4);
    }

    .leaflet-popup-content-wrapper {
      background: #0c1018;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      box-shadow: 0 8px 32px rgba(0,0,0,0.8);
    }
    .leaflet-popup-tip { background: #0c1018; }
    .leaflet-popup-content { margin: 10px 14px; font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.8); }
    .leaflet-popup-close-button { color: rgba(255,255,255,0.4) !important; }

    /* ===== COLLAGE OVERLAY ===== */
    #collage-overlay {
      position: fixed;
      inset: 0;
      background: rgba(4, 6, 12, 0.97);
      z-index: 2000;
      display: flex;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      overflow: hidden;
    }

    #collage-overlay.is-open {
      opacity: 1;
      pointer-events: all;
    }

    .collage-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 36px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
    }

    .collage-location-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-bottom: 3px;
    }

    .collage-title {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
    }

    .collage-close {
      background: none;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 6px;
      color: rgba(255,255,255,0.5);
      font-size: 20px;
      width: 38px; height: 38px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, color 0.2s;
    }
    .collage-close:hover { border-color: rgba(255,255,255,0.6); color: #fff; }

    /* Pinterest-style masonry grid */
    .collage-grid {
      overflow-y: auto;
      flex: 1;
      padding: 24px 32px 40px;
      columns: 4;
      column-gap: 12px;
    }

    @media (max-width: 1100px) { .collage-grid { columns: 3; } }
    @media (max-width: 700px) { .collage-grid { columns: 2; } }

    /* if only 1-2 photos, use flex so they're big */
    .collage-grid.few-photos {
      columns: unset;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      justify-content: center;
    }

    .collage-grid.few-photos .collage-item {
      flex: 1;
      max-width: 600px;
    }

    .collage-grid::-webkit-scrollbar { width: 3px; }
    .collage-grid::-webkit-scrollbar-track { background: transparent; }
    .collage-grid::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

    .collage-item {
      break-inside: avoid;
      margin-bottom: 12px;
      cursor: pointer;
      border-radius: 6px;
      overflow: hidden;
      position: relative;
    }

    .collage-item img {
      width: 100%;
      display: block;
      border-radius: 6px;
      transition: transform 0.3s ease, filter 0.3s ease;
      filter: brightness(0.92);
    }

    .collage-item:hover img {
      transform: scale(1.02);
      filter: brightness(1.05);
    }

    /* ===== LIGHTBOX ===== */
    #lightbox {
      position: fixed;
      inset: 0;
      background: rgba(2, 3, 8, 0.97);
      z-index: 3000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      padding: 40px 60px;
    }

    #lightbox.is-open {
      opacity: 1;
      pointer-events: all;
    }

    #lightbox-img {
      max-width: 100%;
      max-height: calc(100vh - 160px);
      object-fit: contain;
      border-radius: 4px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.9);
    }

    .lightbox-caption-block {
      margin-top: 20px;
      text-align: center;
      max-width: 680px;
    }

    .lightbox-caption {
      font-size: 14px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      letter-spacing: 0.02em;
    }

    /* newspaper-style description */
    .lightbox-desc {
      margin-top: 8px;
      font-size: 12px;
      color: rgba(255,255,255,0.42);
      line-height: 1.7;
      font-style: italic;
      letter-spacing: 0.01em;
    }

    .lightbox-location {
      display: inline-block;
      margin-top: 10px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
    }

    .lightbox-close {
      position: fixed;
      top: 20px;
      right: 24px;
      background: none;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      color: rgba(255,255,255,0.5);
      font-size: 20px;
      width: 38px; height: 38px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .lightbox-close:hover { border-color: rgba(255,255,255,0.6); color: #fff; }

    @media (max-width: 600px) {
      .collage-header { padding: 14px 20px; }
      .collage-grid { padding: 16px; }
      #lightbox { padding: 60px 20px 30px; }
    }
  </style>

  <script>

    {

    {

    {

    },
    {

      caption: "Figure in snowy forest",
      description: "",
      location: "Crater Lake, Oregon",
      lat: 42.9400, lng: -122.1200
    },
    {
      file: "images/writing-card.jpg",
      caption: "Mountain lake in golden fog",
      description: "",
      location: "Rocky Mountain NP, Colorado",
      lat: 40.3428, lng: -105.6836
    },
    {
      file: "images/sunset-mountains.jpg",
      caption: "Hiker in mountain meadow",
      description: "",
      location: "Garibaldi, British Columbia",
      lat: 49.9700, lng: -123.0100
    },
    {
      file: "images/contact-bg.jpg",
      caption: "City lights silhouette",
      description: "",
      location: "Los Angeles, California",
      lat: 34.1016, lng: -118.3401
    },
    {

      caption: "Lapa at night",
      description: "",

    },
    {

    },
    {

    },
    {

    },
    {

      caption: "Jungle waterfall",

      lat: -22.9600, lng: -43.2200
    },
    {

      caption: "Birds above golden clouds",
      description: "",

      lat: -22.8500, lng: -43.1000
    },
    {
      file: "images/contact-btn.jpg",
      caption: "Rooftops and lantern light",
      description: "",
      location: "Kyoto, Japan",
      lat: 35.0116, lng: 135.7681
    },
    {

      caption: "Kyoto in the rain (wide)",
      description: "",
      location: "Kyoto, Japan",
      lat: 35.0050, lng: 135.7600
    },
    {
      file: "images/japrainyver.jpg",
      caption: "Kyoto in the rain",
      description: "",
      location: "Kyoto, Japan",
      lat: 35.0030, lng: 135.7580
    },
    {
      file: "images/japan-mountain.jpg",
      caption: "Mountain village in rain",
      description: "",
      location: "Fujiyoshida, Japan",
      lat: 35.4800, lng: 138.7550
    },
    {
      file: "images/japan-tree.jpg",
      caption: "Pine tree and dramatic sky",
      description: "",
      location: "Fujiyoshida, Japan",
      lat: 35.4869, lng: 138.7640
    },
    {
      file: "images/skybg.jpg",
      caption: "Clouds",
      description: "",
      location: "Unknown",
      lat: 20.0, lng: 0.0
    },
    {
      file: "images/ocean-sepia.jpg",
      caption: "Waves, warm tones",
      description: "",
      location: "Malibu, California",
      lat: 34.0259, lng: -118.7798
    },
    {
      file: "images/img-cliff.jpg",
      caption: "Cliff jumpers, teal water",
      description: "",
      location: "Ensenada, Mexico",
      lat: 31.8667, lng: -116.5960
    },
    {
      file: "images/teal-tree.jpg",
      caption: "Lone tree, teal dusk",
      description: "",
      location: "Hokkaido, Japan",
      lat: 43.0000, lng: 141.3500
    }
  ];

  // ===== MAP =====
  const map = L.map('map', {
    center: [25, 10],
    zoom: 2,
    zoomControl: true,
  });

  L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors, &copy; OpenTopoMap (CC-BY-SA)',
    subdomains: 'abc',
    maxZoom: 17,
    opacity: 1.0
  }).addTo(map);

  // Group by location
  const locationGroups = {};
  PHOTOS.forEach(p => {
    if (!locationGroups[p.location]) locationGroups[p.location] = [];
    locationGroups[p.location].push(p);
  });

  const markers = [];
  let activeMarker = null;

  Object.entries(locationGroups).forEach(([locName, photos]) => {
    const avgLat = photos.reduce((s, p) => s + p.lat, 0) / photos.length;
    const avgLng = photos.reduce((s, p) => s + p.lng, 0) / photos.length;

    const icon = L.divIcon({
      html: '<div class="custom-marker"></div>',
      className: '',
      iconSize: [12, 12],
      iconAnchor: [6, 6]
    });

    const marker = L.marker([avgLat, avgLng], { icon })
      .addTo(map)
      .bindPopup(`<strong>${locName}</strong><br>${photos.length} photo${photos.length > 1 ? 's' : ''}`, { offset: [0, -10] });

    marker._photoData = { locName, photos, lat: avgLat, lng: avgLng };
    markers.push(marker);
    marker.on('click', () => openCollage(marker._photoData));
  });

  // Click anywhere → nearest location
  map.on('click', function(e) {
    let nearest = null, minDist = Infinity;
    markers.forEach(m => {
      const d = haversine(e.latlng.lat, e.latlng.lng, m._photoData.lat, m._photoData.lng);
      if (d < minDist) { minDist = d; nearest = m._photoData; }
    });
    if (nearest) openCollage(nearest);
  });

  function haversine(lat1, lng1, lat2, lng2) {
    const R = 6371, dLat = (lat2-lat1)*Math.PI/180, dLng = (lng2-lng1)*Math.PI/180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  // ===== COLLAGE =====
  const collageOverlay = document.getElementById('collage-overlay');
  const collageGrid = document.getElementById('collage-grid');
  const collageLocationLabel = document.getElementById('collage-location-label');
  const collageTitle = document.getElementById('collage-title');

  function openCollage({ locName, photos }) {
    collageLocationLabel.textContent = locName;
    collageTitle.textContent = photos.length === 1 ? '1 photo from here' : `${photos.length} photos from here`;
    collageGrid.innerHTML = '';

    // Few vs many photos
    if (photos.length <= 2) {
      collageGrid.classList.add('few-photos');
    } else {
      collageGrid.classList.remove('few-photos');
    }

    photos.forEach(p => {
      const item = document.createElement('div');
      item.className = 'collage-item';
      item.addEventListener('click', () => openLightbox(p));

      const img = document.createElement('img');
      img.src = p.file;
      img.alt = p.caption;
      img.loading = 'lazy';

      item.appendChild(img);
      collageGrid.appendChild(item);
    });

    collageOverlay.classList.add('is-open');
  }

  document.getElementById('collage-close').addEventListener('click', closeCollage);
  function closeCollage() {
    collageOverlay.classList.remove('is-open');
  }

  // ===== LIGHTBOX =====
  const lightbox = document.getElementById('lightbox');

  function openLightbox(p) {
    document.getElementById('lightbox-img').src = p.file;
    document.getElementById('lightbox-img').alt = p.caption;
    document.getElementById('lightbox-caption').textContent = p.caption;
    document.getElementById('lightbox-desc').textContent = p.description || '';
    document.getElementById('lightbox-location').textContent = p.location;
    lightbox.classList.add('is-open');
  }

  document.getElementById('lightbox-close').addEventListener('click', () => lightbox.classList.remove('is-open'));

  // Keyboard nav
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      if (lightbox.classList.contains('is-open')) {
        lightbox.classList.remove('is-open');
      } else {
        closeCollage();
      }
    }
  });

  // Click outside image in lightbox to close
  lightbox.addEventListener('click', e => {
    if (e.target === lightbox) lightbox.classList.remove('is-open');
  });
  </script>

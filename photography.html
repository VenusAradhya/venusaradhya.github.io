<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photography · Venus Aradhya</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    /* Map takes up most of the page — taller */
    #map {
      width: 100%;
      flex: 1;
      min-height: 0;
      background: #030507;
    }

    .leaflet-container {
      background: #030507;
      font-family: 'Poppins', sans-serif;
    }

    .photo-page {
      display: flex;
      flex-direction: column;
      /* Fill all remaining viewport height below header + hint bar */
      height: calc(100vh - 58px);
      min-height: 600px;
    }

    .map-hint {
      padding: 10px 48px;
      background: var(--cream);
      border-bottom: 2px solid rgba(15,23,42,0.12);
      font-size: 13px;
      font-weight: 500;
      color: var(--navy);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .map-hint-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--navy);
      flex-shrink: 0;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Drawer */
    #photo-drawer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #0c1018;
      border-top: 2px solid rgba(255,255,255,0.12);
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 1000;
      max-height: 75vh;
      display: flex;
      flex-direction: column;
    }

    #photo-drawer.is-open { transform: translateY(0); }

    .drawer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }

    .drawer-location {
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .drawer-title {
      font-size: 17px;
      font-weight: 700;
      color: #fff;
    }

    .drawer-close {
      background: none;
      border: 1.5px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      color: rgba(255,255,255,0.5);
      font-size: 16px;
      width: 34px; height: 34px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, color 0.2s;
    }

    .drawer-close:hover { border-color: rgba(255,255,255,0.6); color: #fff; }

    .drawer-photos {
      display: flex;
      gap: 20px;
      padding: 20px 32px 28px;
      overflow-x: auto;
      flex: 1;
      align-items: flex-start;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }

    .drawer-photos::-webkit-scrollbar { height: 3px; }
    .drawer-photos::-webkit-scrollbar-track { background: rgba(255,255,255,0.04); }
    .drawer-photos::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

    .drawer-photo-item {
      flex-shrink: 0;
      scroll-snap-align: start;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 320px;
    }

    .drawer-photo-item img {
      height: 220px;
      width: auto;
      max-width: 320px;
      object-fit: cover;
      border-radius: 8px;
      display: block;
      border: 1.5px solid rgba(255,255,255,0.08);
      transition: border-color 0.2s;
    }

    .drawer-photo-item:hover img { border-color: rgba(255,255,255,0.3); }

    .drawer-photo-meta {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .drawer-photo-caption {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.75);
    }

    /* Description — shown if set, invisible but space-preserving if empty */
    .drawer-photo-desc {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      line-height: 1.5;
      font-style: italic;
      min-height: 18px; /* preserves space even when empty */
    }

    /* Map markers */
    .custom-marker {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: rgba(255,255,255,0.9);
      border: 2px solid rgba(255,255,255,0.3);
      box-shadow: 0 0 10px rgba(255,255,255,0.4);
      cursor: pointer;
      transition: transform 0.15s;
    }

    .custom-marker:hover { transform: scale(1.5); }
    .custom-marker.active { box-shadow: 0 0 16px rgba(245,240,232,0.9); transform: scale(1.3); }

    .leaflet-popup-content-wrapper {
      background: #0c1018;
      border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }

    .leaflet-popup-tip { background: #0c1018; }
    .leaflet-popup-content { margin: 10px 14px; font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.8); }
    .leaflet-popup-close-button { color: rgba(255,255,255,0.4) !important; }

    @media (max-width: 640px) {
      .map-hint { padding: 10px 20px; }
      .drawer-header { padding: 14px 20px; }
      .drawer-photos { padding: 16px 20px 20px; gap: 14px; }
      .drawer-photo-item img { height: 170px; }
    }
  </style>
</head>
<body class="page-inner">

  <div class="map-hint">
    <div class="map-hint-dot"></div>
    Click anywhere on the map to find the nearest photos from that location
  </div>

  <div class="photo-page">
    <div id="map"></div>
  </div>

  <div id="photo-drawer" role="dialog" aria-modal="true" aria-label="Photos from this location">
    <div class="drawer-header">
      <div>
        <div class="drawer-location" id="drawer-location">—</div>
        <div class="drawer-title" id="drawer-title">Photos nearby</div>
      </div>
      <button class="drawer-close" id="drawer-close" aria-label="Close">✕</button>
    </div>
    <div class="drawer-photos" id="drawer-photos"></div>
  </div>

  <script src="script.js"></script>
  <script>
  // =============================================

  // - file: path relative to this HTML file

  // - description: optional longer note (leave "" to hide)
  // - location: display name shown in drawer header
  // - lat/lng: decimal coordinates (Google Maps → right-click → copy coords)
  // =============================================
  const PHOTOS = [

    },
    {

      caption: "Hawaiian coast",

      location: "Hawaii",
      lat: 21.3069, lng: -157.8583
    },
    {
      file: "images/foggy-cabin.jpg",
      caption: "Fire lookout in the clouds",
      description: "",
      location: "Mt. Rainier, Washington",
      lat: 46.8523, lng: -121.7603
    },
    {
      file: "images/orange-sunset.jpg",
      caption: "Smoky orange sunset",
      description: "",
      location: "Mt. Rainier, Washington",
      lat: 46.8800, lng: -121.7200
    },
    {
      file: "images/moodyhike.jpg",
      caption: "Moody mountain hike",
      description: "",
      location: "Mt. Rainier, Washington",
      lat: 46.8600, lng: -121.7400
    },
    {
      file: "images/photography-card.jpg",
      caption: "Alpine lake at dusk",
      description: "",
      location: "North Cascades, Washington",
      lat: 48.5151, lng: -121.0798
    },
    {
      file: "images/mountain-hiker.jpg",
      caption: "Lone hiker, glaciers",
      description: "",
      location: "North Cascades, Washington",
      lat: 48.4900, lng: -121.1000
    },
    {
      file: "images/hiking-hor",
      caption: "Hiking at golden hour",
      description: "",
      location: "North Cascades, Washington",
      lat: 48.5300, lng: -121.0500
    },
    {
      file: "images/lake22-hor.jpg",
      caption: "Lake 22",
      description: "",
      location: "Mt. Baker-Snoqualmie, Washington",
      lat: 48.0869, lng: -121.7400
    },
    {
      file: "images/snow-road.jpg",
      caption: "Snowy road through pines",
      description: "",
      location: "Crater Lake, Oregon",
      lat: 42.9446, lng: -122.1090
    },
    {
      file: "images/snow-trees.jpg",
      caption: "Snow-laden forest",
      description: "",
      location: "Crater Lake, Oregon",
      lat: 42.9500, lng: -122.0900
    },
    {
      file: "images/snow-forest-person.jpg",
      caption: "Figure in snowy forest",
      description: "",
      location: "Crater Lake, Oregon",
      lat: 42.9400, lng: -122.1200
    },
    {
      file: "images/writing-card.jpg",
      caption: "Mountain lake in golden fog",
      description: "",
      location: "Rocky Mountain NP, Colorado",
      lat: 40.3428, lng: -105.6836
    },
    {
      file: "images/sunset-mountains.jpg",
      caption: "Hiker in mountain meadow",
      description: "",
      location: "Garibaldi, British Columbia",
      lat: 49.9700, lng: -123.0100
    },
    {
      file: "images/contact-bg.jpg",
      caption: "City lights silhouette",
      description: "",
      location: "Los Angeles, California",
      lat: 34.1016, lng: -118.3401
    },
    {
      file: "images/lapa-street-hor.jpg",
      caption: "Lapa at night",
      description: "",
      location: "Rio de Janeiro, Brazil",
      lat: -22.9068, lng: -43.1800
    },
    {
      file: "images/rio-hill.jpg",
      caption: "Rio hillside staircase",
      description: "",
      location: "Rio de Janeiro, Brazil",
      lat: -22.9200, lng: -43.1729
    },
    {
      file: "images/street-brazil.jpg",
      caption: "Street wires and birds",
      description: "",
      location: "Rio de Janeiro, Brazil",
      lat: -22.9110, lng: -43.1750
    },
    {
      file: "images/rio-night-zoomedout.jpg",
      caption: "Rio at night from above",
      description: "",
      location: "Rio de Janeiro, Brazil",
      lat: -22.9500, lng: -43.2100
    },
    {
      file: "images/jungle-waterfall.jpg",
      caption: "Jungle waterfall",
      description: "",
      location: "Rio de Janeiro, Brazil",
      lat: -22.9600, lng: -43.2200
    },
    {
      file: "images/img-birds.jpg",
      caption: "Birds above golden clouds",
      description: "",
      location: "Rio de Janeiro, Brazil",
      lat: -22.8500, lng: -43.1000
    },
    {
      file: "images/contact-btn.jpg",
      caption: "Rooftops and lantern light",
      description: "",
      location: "Kyoto, Japan",
      lat: 35.0116, lng: 135.7681
    },
    {
      file: "images/japrainyhor.jpg",
      caption: "Kyoto in the rain (wide)",
      description: "",
      location: "Kyoto, Japan",
      lat: 35.0050, lng: 135.7600
    },
    {
      file: "images/japrainyver.jpg",
      caption: "Kyoto in the rain",
      description: "",
      location: "Kyoto, Japan",
      lat: 35.0030, lng: 135.7580
    },
    {
      file: "images/japan-mountain.jpg",
      caption: "Mountain village in rain",
      description: "",
      location: "Fujiyoshida, Japan",
      lat: 35.4800, lng: 138.7550
    },
    {
      file: "images/japan-tree.jpg",
      caption: "Pine tree and dramatic sky",
      description: "",
      location: "Fujiyoshida, Japan",
      lat: 35.4869, lng: 138.7640
    },
    {
      file: "images/skybg.jpg",
      caption: "Clouds",
      description: "",
      location: "Unknown",
      lat: 20.0, lng: 0.0
    },
    {
      file: "images/ocean-sepia.jpg",
      caption: "Waves, warm tones",
      description: "",
      location: "Malibu, California",
      lat: 34.0259, lng: -118.7798
    },
    {
      file: "images/img-cliff.jpg",
      caption: "Cliff jumpers, teal water",
      description: "",
      location: "Ensenada, Mexico",
      lat: 31.8667, lng: -116.5960
    },
    {
      file: "images/teal-tree.jpg",
      caption: "Lone tree, teal dusk",
      description: "",
      location: "Hokkaido, Japan",
      lat: 43.0000, lng: 141.3500
    }
  ];

  // =============================================
  // MAP INIT — dark CartoDB tiles, no API key needed
  // =============================================
  const map = L.map('map', {
    center: [25, 10],
    zoom: 2,
    zoomControl: true,
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    subdomains: 'abcd',
    maxZoom: 19,
    opacity: 1.0
  }).addTo(map);

  // Add a dark overlay layer on top of tiles for extra depth
  const darkOverlay = L.rectangle([[-90, -180], [90, 180]], {
    color: 'none',
    fillColor: '#000',
    fillOpacity: 0.35,
    interactive: false
  }).addTo(map);

  // Group by location name
  const locationGroups = {};
  PHOTOS.forEach(p => {
    if (!locationGroups[p.location]) locationGroups[p.location] = [];
    locationGroups[p.location].push(p);
  });

  // Place markers
  const markers = [];
  Object.entries(locationGroups).forEach(([locName, photos]) => {
    const avgLat = photos.reduce((s, p) => s + p.lat, 0) / photos.length;
    const avgLng = photos.reduce((s, p) => s + p.lng, 0) / photos.length;

    const icon = L.divIcon({
      html: '<div class="custom-marker"></div>',
      className: '',
      iconSize: [14, 14],
      iconAnchor: [7, 7]
    });

    const marker = L.marker([avgLat, avgLng], { icon })
      .addTo(map)
      .bindPopup(`<strong>${locName}</strong><br>${photos.length} photo${photos.length > 1 ? 's' : ''}`, { offset: [0, -10] });

    marker._photoData = { locName, photos, lat: avgLat, lng: avgLng };
    markers.push(marker);
    marker.on('click', () => openDrawer(marker._photoData));
  });

  // Click anywhere → nearest location
  map.on('click', function(e) {
    let nearest = null, minDist = Infinity;
    markers.forEach(m => {
      const d = haversine(e.latlng.lat, e.latlng.lng, m._photoData.lat, m._photoData.lng);
      if (d < minDist) { minDist = d; nearest = m._photoData; }
    });
    if (nearest) openDrawer(nearest);
  });

  function haversine(lat1, lng1, lat2, lng2) {
    const R = 6371, dLat = (lat2-lat1)*Math.PI/180, dLng = (lng2-lng1)*Math.PI/180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  // =============================================
  // DRAWER
  // =============================================
  const drawer = document.getElementById('photo-drawer');
  const drawerLocation = document.getElementById('drawer-location');
  const drawerTitle = document.getElementById('drawer-title');
  const drawerPhotos = document.getElementById('drawer-photos');

  function openDrawer({ locName, photos }) {
    drawerLocation.textContent = locName;
    drawerTitle.textContent = `${photos.length} photo${photos.length > 1 ? 's' : ''} from here`;
    drawerPhotos.innerHTML = '';

    photos.forEach(p => {
      const item = document.createElement('div');
      item.className = 'drawer-photo-item';

      const img = document.createElement('img');
      img.src = p.file;
      img.alt = p.caption;
      img.loading = 'lazy';

      const meta = document.createElement('div');
      meta.className = 'drawer-photo-meta';

      const cap = document.createElement('div');
      cap.className = 'drawer-photo-caption';
      cap.textContent = p.caption;

      const desc = document.createElement('div');
      desc.className = 'drawer-photo-desc';
      desc.textContent = p.description || '';

      meta.appendChild(cap);
      meta.appendChild(desc);
      item.appendChild(img);
      item.appendChild(meta);
      drawerPhotos.appendChild(item);
    });

    drawer.classList.add('is-open');
  }

  document.getElementById('drawer-close').addEventListener('click', () => drawer.classList.remove('is-open'));
  document.addEventListener('keydown', e => { if (e.key === 'Escape') drawer.classList.remove('is-open'); });
  </script>

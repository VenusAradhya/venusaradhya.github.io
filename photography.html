  <style>
    body { margin:0; background:#070a12; }

    .photo-page { display:flex; flex-direction:column; height:100vh; overflow:hidden; }

    .map-hint {
      padding: 9px 48px;
      background: rgba(7,10,18,0.95);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      font-size: 12px; font-weight: 500;
      color: rgba(255,255,255,0.45);
      display: flex; align-items: center; gap: 8px;
      flex-shrink: 0; letter-spacing: 0.04em;
    }
    .map-hint-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: rgba(255,255,255,0.35); flex-shrink: 0;
      animation: pulse 2.5s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }

    #map { width:100%; flex:1; min-height:0; background:#080c10; }
    .leaflet-container { background:#080c10; font-family:'Poppins',sans-serif; }

    .custom-marker {
      width:12px; height:12px; border-radius:50%;
      background:rgba(255,255,255,0.85);
      border:1.5px solid rgba(255,255,255,0.3);
      box-shadow:0 0 8px rgba(255,255,255,0.3);
      cursor:pointer; transition:transform 0.15s;
    }
    .custom-marker:hover { transform:scale(1.6); }

    .leaflet-popup-content-wrapper {
      background:#0c1018; border:1px solid rgba(255,255,255,0.12);
      border-radius:8px; color:#fff; font-family:'Poppins',sans-serif;
    }
    .leaflet-popup-tip { background:#0c1018; }
    .leaflet-popup-content { margin:10px 14px; font-size:13px; font-weight:500; color:rgba(255,255,255,0.8); }
    .leaflet-popup-close-button { color:rgba(255,255,255,0.4) !important; }

    /* ── COLLAGE OVERLAY ── */
    #collage-overlay {
      position:fixed; inset:0;
      background:rgba(4,6,12,0.97);
      z-index:2000; display:flex; flex-direction:column;
      opacity:0; pointer-events:none; transition:opacity 0.3s;
    }
    #collage-overlay.open { opacity:1; pointer-events:all; }

    .collage-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:18px 36px; border-bottom:1px solid rgba(255,255,255,0.07);
      flex-shrink:0;
    }
    .collage-loc { font-size:10px; font-weight:600; letter-spacing:0.14em;
      text-transform:uppercase; color:rgba(255,255,255,0.35); margin-bottom:3px; }
    .collage-title { font-size:20px; font-weight:700; color:#fff; }
    .collage-close {
      background:none; border:1px solid rgba(255,255,255,0.2); border-radius:6px;
      color:rgba(255,255,255,0.5); font-size:18px; width:36px; height:36px;
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:all 0.2s;
    }
    .collage-close:hover { border-color:#fff; color:#fff; }

    /* masonry grid */
    .collage-grid {
      overflow-y:auto; flex:1;
      padding:20px 28px 40px;
      columns:4; column-gap:10px;
    }
    @media(max-width:1100px){.collage-grid{columns:3}}
    @media(max-width:700px){.collage-grid{columns:2}}
    .collage-grid::-webkit-scrollbar{width:3px}
    .collage-grid::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}

    /* 1-2 photos: big centered flex */
    .collage-grid.few { columns:unset; display:flex; gap:10px; align-items:flex-start; justify-content:center; }
    .collage-grid.few .collage-item { flex:1; max-width:580px; }

    .collage-item {
      break-inside:avoid; margin-bottom:10px;
      cursor:pointer; border-radius:6px; overflow:hidden;
    }
    .collage-item img {
      width:100%; display:block; border-radius:6px;
      transition:transform 0.3s, filter 0.3s;
      filter:brightness(0.9);
    }
    .collage-item:hover img { transform:scale(1.02); filter:brightness(1.05); }

    /* ── LIGHTBOX ── */
    #lightbox {
      position:fixed; inset:0;
      background:rgba(2,3,8,0.97);
      z-index:3000; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding:50px 60px 36px;
      opacity:0; pointer-events:none; transition:opacity 0.25s;
    }
    #lightbox.open { opacity:1; pointer-events:all; }

    #lb-img {
      max-width:100%; max-height:calc(100vh - 180px);
      object-fit:contain; border-radius:4px;
      box-shadow:0 30px 80px rgba(0,0,0,0.9);
    }
    .lb-caption-block { margin-top:18px; text-align:center; max-width:680px; }
    .lb-caption { font-size:14px; font-weight:600; color:rgba(255,255,255,0.9); letter-spacing:0.02em; }
    .lb-desc { margin-top:7px; font-size:12px; color:rgba(255,255,255,0.38);
      line-height:1.7; font-style:italic; }
    .lb-loc { display:inline-block; margin-top:9px; font-size:10px; font-weight:600;
      letter-spacing:0.12em; text-transform:uppercase; color:rgba(255,255,255,0.22); }

    .lb-close {
      position:fixed; top:18px; right:22px;
      background:none; border:1px solid rgba(255,255,255,0.2); border-radius:6px;
      color:rgba(255,255,255,0.5); font-size:18px; width:36px; height:36px;
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:all 0.2s;
    }
    .lb-close:hover { border-color:#fff; color:#fff; }
  </style>

      lat: 43.0000, lng: 141.3500
    }

const map = L.map('map', { center:[25,10], zoom:2 });

L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors, &copy; OpenTopoMap (CC-BY-SA)',
  subdomains: 'abc', maxZoom: 17
}).addTo(map);

// Group photos by location
const groups = {};
PHOTOS.forEach(p => {
  if (!groups[p.location]) groups[p.location] = [];
  groups[p.location].push(p);
});

// Place markers
const markers = [];
Object.entries(groups).forEach(([loc, photos]) => {
  const lat = photos.reduce((s,p)=>s+p.lat,0)/photos.length;
  const lng = photos.reduce((s,p)=>s+p.lng,0)/photos.length;
  const icon = L.divIcon({ html:'<div class="custom-marker"></div>', className:'', iconSize:[12,12], iconAnchor:[6,6] });
  const m = L.marker([lat,lng],{icon}).addTo(map)
    .bindPopup(`<strong>${loc}</strong><br>${photos.length} photo${photos.length>1?'s':''}`,{offset:[0,-10]});
  m._d = {loc, photos, lat, lng};
  markers.push(m);
  m.on('click', ()=>openCollage(m._d));
});

// Click map -> nearest location
map.on('click', e => {
  let nearest=null, best=Infinity;
  markers.forEach(m => {
    const R=6371, dLat=(m._d.lat-e.latlng.lat)*Math.PI/180, dLng=(m._d.lng-e.latlng.lng)*Math.PI/180;
    const a=Math.sin(dLat/2)**2+Math.cos(e.latlng.lat*Math.PI/180)*Math.cos(m._d.lat*Math.PI/180)*Math.sin(dLng/2)**2;
    const d=R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
    if(d<best){best=d;nearest=m._d;}
  });
  if(nearest) openCollage(nearest);
});

// ── COLLAGE ──
const overlay  = document.getElementById('collage-overlay');
const colGrid  = document.getElementById('col-grid');

function openCollage({loc, photos}) {
  document.getElementById('col-loc').textContent = loc;
  document.getElementById('col-title').textContent = photos.length===1 ? '1 photo' : `${photos.length} photos`;
  colGrid.innerHTML = '';
  colGrid.className = 'collage-grid' + (photos.length <= 2 ? ' few' : '');

  photos.forEach(p => {
    const item = document.createElement('div');
    item.className = 'collage-item';
    item.onclick = () => openLightbox(p);
    const img = document.createElement('img');
    img.src = p.file; img.alt = p.caption; img.loading = 'lazy';
    item.appendChild(img);
    colGrid.appendChild(item);
  });
  overlay.classList.add('open');
}

document.getElementById('col-close').onclick = () => overlay.classList.remove('open');

// ── LIGHTBOX ──
const lb = document.getElementById('lightbox');

function openLightbox(p) {
  document.getElementById('lb-img').src = p.file;
  document.getElementById('lb-img').alt = p.caption;
  document.getElementById('lb-caption').textContent = p.caption;
  document.getElementById('lb-desc').textContent = p.description || '';
  document.getElementById('lb-loc').textContent = p.location;
  lb.classList.add('open');
}

document.getElementById('lb-close').onclick = () => lb.classList.remove('open');
lb.onclick = e => { if(e.target===lb) lb.classList.remove('open'); };

document.addEventListener('keydown', e => {
  if(e.key==='Escape') {
    if(lb.classList.contains('open')) lb.classList.remove('open');
    else overlay.classList.remove('open');
  }
});
</script>
